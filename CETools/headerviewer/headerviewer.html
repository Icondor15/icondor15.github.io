        <h1 style="margin-bottom: -5px;">CE Game Header Viewer</h1>
        <span style="opacity: 0.3; font-size: 11px;">(Arguably the laziest page I've made on this site lmao)</span>
        <p>
            Genre:
            <select id="genreSelect" autocomplete="off">
                <option>All</option>
                <option>Action</option>
                <option>Arcade</option>
                <option>Bullet Hell</option>
                <option>First-Person</option>
                <option>Platformer</option>
                <option>Strategy</option>
            </select>
            - Tier:
            <select id="tierSelect" autocomplete="off">
                <option>All</option>
                <option>Tier 0</option>
                <option>Tier 1</option>
                <option>Tier 2</option>
                <option>Tier 3</option>
                <option>Tier 4</option>
                <option>Tier 5</option>
                <option>Tier 6</option>
                <option>Tier 7</option>
            </select>
        </p>
        <button onclick="generateTable();" style="margin-bottom: -5px;">Show me dem Headers!</button>
        <br>
        <span style="opacity: 0.4; font-size: 11px;">[if the sizes don't load properly just click the button again]</span>

        <!--Game List-->
        <script src="../formattedList.js"></script>
        <!--Actual Code-->
        <script>
            function generateTable()
            {
                document.querySelectorAll('table').forEach(e => {e.remove()});

                var filteredData = data;

                //Filter Genre
                if(document.getElementById("genreSelect").value != "All")
                {
                    filteredData = filteredData.filter(game => {if(document.getElementById("genreSelect").value == game["genre"]){return true} else {return false}})
                }
                //Filter Tier
                if(document.getElementById("tierSelect").value != "All")
                {
                    filteredData = filteredData.filter(game => {if(document.getElementById("tierSelect").value.slice(-1) == game["tier"]){return true} else {return false}})
                }

                var table = document.createElement("table");

                filteredData.forEach(game =>
                {
                    var row = table.insertRow(table.rows.length);
                    var cellImage = row.insertCell(row.cells.length);
                    var imageElement = document.createElement("img");
                    imageElement.setAttribute("src", game["header"]);
                    imageElement.setAttribute("style", 'width: 460px; height: 215px;');
                    cellImage.appendChild(imageElement);

                    var cellInfo = row.insertCell(row.cells.length);
                    cellInfo.innerHTML = "<h2>" + game["name"] +  " </h2>";

                    if(imageElement.naturalWidth != 460 || imageElement.naturalHeight != 215) {cellInfo.innerHTML += "<p style='color: red;'>Original image size: " + imageElement.naturalWidth + "x" + imageElement.naturalHeight + "px</p>";}
                    else {cellInfo.innerHTML += "<p>Original image size: " + imageElement.naturalWidth + "x" + imageElement.naturalHeight + "px</p>";}
                    if(game["header"].toLowerCase().includes(".png")) {cellInfo.innerHTML += "File Type: PNG"}
                    else if(game["header"].toLowerCase().includes(".jpg") ||game["header"].toLowerCase().includes(".jpeg")) {cellInfo.innerHTML += "File Type: JPEG"}
                    else if(game["header"].toLowerCase().includes(".webp")) {cellInfo.innerHTML += "File Type: WEBP"}
                    else {cellInfo.innerHTML += "File Type: Unknown :C"}
                    cellInfo.innerHTML += "<p><a href='" + game["header"] + "' download target='_blank'><button>Open Image Link!</button></a> - <button onclick='navigator.clipboard.writeText(\"" + game["header"] + "\")'>Copy Image Link!</button></p>"
                })
                document.getElementById("main").appendChild(table);
            }
        </script>
